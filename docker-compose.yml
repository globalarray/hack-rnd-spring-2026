services:
  postgres_engine:
    ports:
      - "5432:5432"
    image: postgres:16-alpine
    networks:
      - hack-net
    environment:
      POSTGRES_USER: ${ENGINE_PG_USER}
      POSTGRES_PASSWORD: ${ENGINE_PG_PASSWORD}
      POSTGRES_DB: ${ENGINE_PG_DATABASE}
    volumes:
      - "engine_pgdata:/var/lib/postgresql/data"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ENGINE_PG_USER} -d ${ENGINE_PG_DATABASE}" ]
      interval: 5s
      timeout: 5s
      retries: 5
  migrations:
    image: migrate/migrate
    networks:
      - hack-net
    volumes:
      - ${PWD}/services/engine-go/migrations:/migrations
    command:
      - -path=/migrations/
      - -database=postgres://${ENGINE_PG_USER}:${ENGINE_PG_PASSWORD}@postgres_engine:5432/${ENGINE_PG_DATABASE}?sslmode=disable
      - up
    depends_on:
      postgres_engine:
        condition: service_healthy
  test-engine:
    build:
      context: .
      dockerfile: services/engine-go/Dockerfile
    networks:
      - hack-net
    depends_on:
      postgres_engine:
        condition: service_healthy
    environment:
      APP_ENV: development
    env_file: services/engine-go/.env
    ports:
      - "50036:50036"
    volumes:
      - ./certs/ca.crt:/etc/certs/ca.crt:ro
      - ./certs/server.crt:/etc/certs/server.crt:ro
      - ./certs/server.key:/etc/certs/server.key:ro
  analytics-python:
    build:
      context: .
      dockerfile: services/analytics-python/Dockerfile
    networks:
      - hack-net
    depends_on:
      test-engine:
        condition: service_started
    ports:
      - "50051:50051"
  bff-go:
    build:
      context: .
      dockerfile: services/bff-go/Dockerfile
    networks:
      - hack-net
    depends_on:
      test-engine:
        condition: service_started
      analytics-python:
        condition: service_started
    environment:
      PORT: 8080
      ENGINE_ADDR: test-engine:50036
      ENGINE_INSECURE: "false"
      ENGINE_CA_CERT_PATH: /etc/certs/ca.crt
      ENGINE_CLIENT_CERT_PATH: /etc/certs/client.crt
      ENGINE_CLIENT_KEY_PATH: /etc/certs/client.key
      ENGINE_SERVER_NAME: testengine
      ANALYTICS_ADDR: analytics-python:50051
      ANALYTICS_INSECURE: "true"
      DEFAULT_CLIENT_REPORT_FORMAT: ${DEFAULT_CLIENT_REPORT_FORMAT:-client_docx}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@profdnk.local}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
    ports:
      - "8080:8080"
    volumes:
      - ./certs/ca.crt:/etc/certs/ca.crt:ro
      - ./certs/client.crt:/etc/certs/client.crt:ro
      - ./certs/client.key:/etc/certs/client.key:ro
networks:
  hack-net:
    driver: bridge
volumes:
  engine_pgdata:
