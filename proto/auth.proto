syntax="proto3";

package auth;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package= "./gen/go;auth";

service AuthService {
    rpc GetProfile(google.protobuf.Empty) returns (ProfileResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (ProfileResponse);
    rpc GetPublicProfile(PublicProfileRequest) returns (PublicProfileResponse);
    rpc UnBlockUser(UnBlockUserRequest) returns (google.protobuf.Empty);
    rpc BlockUser(BlockUserRequest) returns (google.protobuf.Empty);
    rpc CreateInvitation(CreateInvitationRequest) returns (InvitationResponse);
    rpc Register(RegisterRequest) returns (TokenResponse);
    rpc Login(LoginRequest) returns (TokenResponse);
    rpc RefreshToken(RefreshTokenRequest) returns (TokenResponse);
}

message ProfileResponse {
    string id = 1;
    string email = 2;
    string full_name = 3;
    string phone = 4;
    string role = 5;
    string photo_url = 6;
    string about = 7;
}

message UnBlockUserRequest{
    string email = 1;
}

message BlockUserRequest{
    string email = 1;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message TokenResponse {
    string access_token = 1;
    string refresh_token = 2;
    int64 expires_in = 3;
    string role = 4;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RegisterRequest{
    string password = 1;
    string token = 2;
}

message CreateInvitationRequest{
    string full_name = 1;
    string number = 2;
    string email = 3;
    google.protobuf.Timestamp access_until = 4;
    string role = 5;
    google.protobuf.Timestamp expires_at = 6;
}

message InvitationResponse{
    string token = 1;
}

message UpdateProfileRequest {
    string photo_url = 1;
    string about = 2;
}

message PublicProfileRequest {
    string user_id = 1;
}

message PublicProfileResponse {
    string full_name = 1;
    string photo_url = 2;
    string about = 3;
}
