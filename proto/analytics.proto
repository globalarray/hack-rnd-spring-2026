syntax = "proto3";

package analytics.v1;
option go_package = "sourcecraft.dev/benzo/bff/internal/clients/grpc/analyticspb;analyticspb";

enum QuestionType {
  QUESTION_TYPE_UNSPECIFIED = 0;
  CHOICE = 1;
  TEXT = 2;
}

enum ReportFormat {
  REPORT_FORMAT_UNSPECIFIED = 0;
  REPORT_FORMAT_DOCX = 1;
  REPORT_FORMAT_HTML = 2;
  REPORT_FORMAT_PSYCHO_DOCX = 3;
  REPORT_FORMAT_PSYCHO_HTML = 4;
}

message RawClientResponse {
  string question_id = 1;
  QuestionType question_type = 2;
  string question_text = 3;
  double selected_weight = 4;
  string category_tag = 5;
  string raw_text = 6;
}

message GenerateReportRequest {
  string session_id = 1;
  ReportFormat format = 2;
  // Opaque JSON from StartSessionRequest.client_metadata_json.
  // The report generator uses full_name/fullName/fio to personalize the report.
  string client_metadata_json = 3;
  repeated RawClientResponse responses = 4;
}

message GenerateReportResponse {
  bytes file_content = 1;
  string content_type = 2;
  string suggested_filename = 3;
}

service AnalyticsService {
  rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
}
